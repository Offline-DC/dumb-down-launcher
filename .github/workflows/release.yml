name: Release

on:
  push:
    tags:
      # Stable releases only. The `!v*-*` negation excludes any tag with a
      # hyphen, so prerelease tags like `v4.58.0-beta.1`, `v4.58.0-rc.1`,
      # `v4.58.0-alpha.2` fall through to `beta-release.yml` instead of
      # being published as stable here. Both workflows share the same
      # signing secrets, so the beta channel installs over the stable one
      # cleanly when a user opts in.
      - 'v*'
      - '!v*-*'

# A re-tag of the same name (rare, but happens during recovery) shouldn't
# race a release that's already mid-build. Drop the older run in favor of
# the new one so the GitHub Release ends up pointing at the artifact from
# the most recent push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$SRC" dumb-down-launcher.apk
          echo "sha256=$(sha256sum dumb-down-launcher.apk | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Parse version code
        id: version
        run: |
          echo "code=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "version_code=${{ steps.version.outputs.code }}\nsha256=${{ steps.apk.outputs.sha256 }}"
          files: dumb-down-launcher.apk
