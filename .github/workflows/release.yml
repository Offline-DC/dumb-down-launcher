name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout launcher repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$APK" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+' | head -1)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Checkout dumb.co repo
        uses: actions/checkout@v4
        with:
          repository: Offline-DC/dumb.co
          token: ${{ secrets.DUMB_CO_PAT }}
          path: dumb-co

      - name: Copy APK to dumb.co
        run: cp "${{ steps.apk.outputs.path }}" dumb-co/public/downloads/dumb-down-launcher.apk

      - name: Update apps.json
        run: |
          cd dumb-co
          jq \
            --arg version "${{ steps.version.outputs.name }}" \
            --argjson code ${{ steps.version.outputs.code }} \
            --arg sha256 "${{ steps.apk.outputs.sha256 }}" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.apps["dumb-down-launcher"].latest_version = $version |
             .apps["dumb-down-launcher"].version_code = $code |
             .apps["dumb-down-launcher"].sha256 = $sha256 |
             .apps["dumb-down-launcher"].published_at = $published_at' \
            public/downloads/apps.json > /tmp/apps.json
          mv /tmp/apps.json public/downloads/apps.json

      - name: Commit and push to dumb.co
        run: |
          cd dumb-co
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/dumb-down-launcher.apk public/downloads/apps.json
          git commit -m "chore: dumb-down-launcher v${{ steps.version.outputs.name }}"
          git push
